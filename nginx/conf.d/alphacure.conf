# ============================================================
# kk.alphacure.com — Keycloak IAM
# ============================================================
server {
    listen 80;
    server_name kk.alphacure.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name kk.alphacure.com;

    ssl_certificate     /etc/letsencrypt/live/kk.alphacure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kk.alphacure.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy vers Keycloak
    location / {
        proxy_pass http://alphacure-keycloak:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

