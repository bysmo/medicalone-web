# ============================================================
# app.alphacure.com — Interface cliniques (alphacure-ui)
# ============================================================
server {
    listen 80;
    server_name app.alphacure.com;

    # Utilisé par Certbot pour les challenges ACME
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.alphacure.com;

    ssl_certificate     /etc/letsencrypt/live/app.alphacure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.alphacure.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # En-têtes sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Proxy vers l'interface React (alphacure-ui)
    location / {
        proxy_pass http://alphacure-ui:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

