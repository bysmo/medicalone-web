spring:
  application:
    name: identity-service
  config:
    import: "optional:configserver:http://alphacure-config:8888"
  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 3000
        max-interval: 10000
        multiplier: 1.5
        max-attempts: 6
  # Pas de datasource — identity-service est un proxy Keycloak sans BDD locale
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://alphacure-keycloak:8180/realms/alphacure/protocol/openid-connect/certs

server:
  port: 8081

# Keycloak — paramètres pour le proxy d'authentification (login/refresh/logout)
keycloak:
  auth-server-url: http://alphacure-keycloak:8180
  realm: alphacure
  client-id: alphacure-app
  client-secret: ${KEYCLOAK_CLIENT_SECRET:}  # Laisser vide si public client

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
