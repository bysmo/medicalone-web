---
# ================================================================
# Discovery Service (Eureka)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service
  namespace: alphacure
  labels:
    app: discovery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service
  template:
    metadata:
      labels:
        app: discovery-service
    spec:
      containers:
        - name: discovery-service
          image: alphacure/discovery-service:latest
          ports:
            - containerPort: 8761
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service
  namespace: alphacure
spec:
  selector:
    app: discovery-service
  ports:
    - port: 8761
      targetPort: 8761
  type: ClusterIP

---
# ================================================================
# Gateway Service
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: alphacure
  labels:
    app: gateway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: alphacure/gateway-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: alphacure-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: alphacure
spec:
  selector:
    app: gateway-service
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer

---
# ================================================================
# Patient Service
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: alphacure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: alphacure/patient-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: alphacure-config
            - secretRef:
                name: alphacure-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/db_patient?createDatabaseIfNotExist=true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: alphacure
spec:
  selector:
    app: patient-service
  ports:
    - port: 8084
      targetPort: 8084
  type: ClusterIP

---
# ================================================================
# Billing Service
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: alphacure
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
        - name: billing-service
          image: alphacure/billing-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: alphacure-config
            - secretRef:
                name: alphacure-secrets
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql-service:3306/db_billing?createDatabaseIfNotExist=true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 40
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: alphacure
spec:
  selector:
    app: billing-service
  ports:
    - port: 8086
      targetPort: 8086
  type: ClusterIP
