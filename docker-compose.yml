# ================================================================
# AlphaCureClinic — Docker Compose COMPLET
# ================================================================

services:
  # --- Base de données ---
  mysql:
    image: mysql:8.0
    container_name: alphacure-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: alphacure_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: alphacure
      MYSQL_PASSWORD: alphacure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alphacure-network

  # --- Sécurité ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: alphacure-keycloak
    command: start-dev --import-realm --http-port=8180
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
    ports:
      - "8180:8180"
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    networks:
      - alphacure-network

  # --- Infrastructure ---
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    container_name: alphacure-discovery
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - alphacure-network

  config-service:
    build:
      context: ./config-service
      dockerfile: Dockerfile
    container_name: alphacure-config
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,native
    networks:
      - alphacure-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - discovery-service

  # --- Messagerie ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: alphacure-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - alphacure-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: alphacure-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: alphacure-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://alphacure-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - alphacure-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: alphacure-kafka-ui
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: alphacure-kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: alphacure-zookeeper:2181
    networks:
      - alphacure-network

  # --- API Gateway ---
  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://alphacure-config:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://alphacure-discovery:8761/eureka/
    depends_on:
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  # --- Microservices ---
  patient-service:
    build: ./patient-service
    container_name: alphacure-patient
    ports: ["8084:8081"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://alphacure-config:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://alphacure-discovery:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  billing-service:
    build: ./billing-service
    container_name: alphacure-billing
    ports: ["8085:8081"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://alphacure-config:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://alphacure-discovery:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  identity-service:
    build: ./identity-service
    container_name: alphacure-identity
    ports: ["8083:8081"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://alphacure-config:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://alphacure-discovery:8761/eureka/
      # Proxy Keycloak — plus de BDD locale
      - KEYCLOAK_AUTH_SERVER_URL=http://alphacure-keycloak:8180
      - KEYCLOAK_REALM=alphacure
      - KEYCLOAK_CLIENT_ID=alphacure-app
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
    depends_on:
      keycloak:
        condition: service_started
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  clinic-service:
    build: ./clinic-service
    container_name: alphacure-clinic
    ports: ["8082:8081"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  nomenclature-service:
    build: ./nomenclature-service
    container_name: alphacure-nomenclature
    ports: ["8089:8080"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://alphacure-config:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://alphacure-discovery:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  medical-record-service:
    build: ./medical-record-service
    container_name: alphacure-medical-record
    ports: ["8086:8081"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CLOUD_CONFIG_URI=http://alphacure-config:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://alphacure-discovery:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      config-service:
        condition: service_healthy
    networks:
      - alphacure-network

  # --- UI ---
  alphacure-ui:
    build: ./alphacure-ui
    container_name: alphacure-ui
    ports: ["3000:80"]
    networks:
      - alphacure-network

  alphacure-admin:
    build: ./alphacure-admin
    container_name: alphacure-admin
    ports: ["3001:80"]
    networks:
      - alphacure-network

  # --- Tests ---
  integration-test-service:
    build: ./integration-test-service
    container_name: integration-test-service
    ports: ["8099:8099"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - alphacure-network

networks:
  alphacure-network:
    driver: bridge
