spring:
  application:
    name: medical-record-service
  datasource:
    url: jdbc:mysql://alphacure-mysql:3306/alphacure_medical_record?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://alphacure-keycloak:8180/realms/alphacure/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://alphacure-discovery:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
