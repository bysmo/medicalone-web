# Configuration par défaut partagée par tous les microservices
spring:
  datasource:
    url: jdbc:mysql://alphacure-mysql:3306/alphacure_${spring.application.name}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:alphacure-kafka:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${spring.application.name}-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.altes.alphacure.*"
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://alphacure-keycloak:8180/realms/alphacure/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://alphacure-discovery:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
