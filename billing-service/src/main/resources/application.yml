server:
  port: 8086

spring:
  application:
    name: billing-service
  config:
    import: "optional:configserver:http://alphacure-config:8888"
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:alphacure-kafka:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://alphacure-keycloak:8180/realms/alphacure/protocol/openid-connect/certs}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://discovery-service:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
